name: publish
on:
  push:
    branches:
      - 'main'       # Run the workflow when pushing to the main branch  
  release:
    types:
      - published    # Run the workflow when a new GitHub release is published
  workflow_dispatch: # Allow running the workflow manually from the GitHub UI

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace}}/nuget

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write  # Required for dorny/test-reporter to create check runs
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Get all history to allow automatic versioning using MinVer

    - uses: actions/setup-python@v6
      with:
        python-version: '3.10' 

    - name: Install threatexchange CLI
      run: python3 -m pip install threatexchange --upgrade

    # Install the .NET SDK indicated in the global.json file
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build -c Release

    - name: Test
      run: dotnet test -c Release --no-build

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: success() || failure()    # run this step even if previous step failed
      with:
        name: Tests            # Name of the check run which will be created
        path: test/PdqHash.Tests/TestResults/**/*.trx    # Path to test results
        reporter: dotnet-trx        # Format of test results

    # Create the NuGet package in the folder from the environment variable NuGetDirectory
    - name: Pack
      run: dotnet pack --configuration Release --output ${{ env.NuGetDirectory }}

    # Publish the NuGet package as an artifact, so they can be used in the following jobs
    - uses: actions/upload-artifact@v7
      with:
        name: nuget
        if-no-files-found: error
        retention-days: 7
        path: ${{ env.NuGetDirectory }}/*.nupkg
        
  deploy:
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      packages: write   # Required to publish to GitHub Packages
      id-token: write   # Required for NuGet trusted publishing (OIDC)
    steps:
      # Download the NuGet package created in the previous job
      - uses: actions/download-artifact@v8
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      # Install the .NET SDK indicated in the global.json file
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5

      # Publish all NuGet packages to NuGet.org
      # Use --skip-duplicate to prevent errors if a package with the same version already exists.
      # If you retry a failed workflow, already published packages will be skipped without error.
      - name: Publish GitHub package
        run: |
          dotnet nuget push ${NuGetDirectory}/*.nupkg --api-key "${{ secrets.GITHUB_TOKEN }}" --source "https://nuget.pkg.github.com/crispthinking/index.json" --skip-duplicate

      - name: NuGet login (OIDC → temp API key)
        if: github.event_name == 'release'
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet package
        if: github.event_name == 'release'
        run: |
          dotnet nuget push ${NuGetDirectory}/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
